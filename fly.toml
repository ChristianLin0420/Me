# fly.toml app configuration file generated for christian-lin-me on 2026-03-22T15:34:03+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'christian-lin-me'
primary_region = 'sjc'

[build]

[env]
  DB_DIR = '/data'
  NODE_ENV = 'production'
  PORT = '3000'

[[mounts]]
  source = 'archivist_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
