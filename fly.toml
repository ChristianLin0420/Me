app = 'archivist-me'
primary_region = 'lax'

[build]

[env]
  PORT = '3000'
  NODE_ENV = 'production'
  DB_DIR = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[mounts]
  source = 'archivist_data'
  destination = '/data'
